<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Notes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="Notes list">
        <div class="brand-row">
          <div>
            <h1>Notes</h1>
            <p id="noteCount">0 saved</p>
          </div>
          <button id="newNoteButton" class="icon-button" type="button" title="New note" aria-label="New note">
            +
          </button>
        </div>

        <label class="search-box" for="searchInput">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Find a note" autocomplete="off" />
        </label>

        <div id="notesList" class="notes-list"></div>
      </section>

      <section class="editor" aria-label="Note editor">
        <div class="editor-toolbar">
          <input id="titleInput" class="title-input" type="text" placeholder="Note title" maxlength="80" />
          <button id="deleteButton" class="danger-button" type="button">Delete</button>
        </div>

        <textarea id="bodyInput" class="body-input" placeholder="Write your note here..."></textarea>

        <div class="status-row">
          <span id="saveStatus">Saved</span>
          <span id="updatedAt"></span>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
